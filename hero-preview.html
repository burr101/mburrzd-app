<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBURRZD — Hero Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      gap: 40px;
    }

    .label {
      color: #555;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: -30px;
    }

    /* Phone frame */
    .phone {
      width: 390px;
      height: 844px;
      background: #000;
      border-radius: 54px;
      border: 10px solid #1a1a1a;
      box-shadow: 0 0 0 2px #333, 0 40px 80px rgba(0,0,0,0.8);
      overflow: hidden;
      position: relative;
    }

    /* Notch */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 0 0 20px 20px;
      z-index: 100;
    }

    /* Hero section */
    .hero {
      width: 100%;
      height: 658px; /* ~78% of 844 */
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    .hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Gradient overlay matching the app */
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.35) 0%,
        transparent 30%,
        rgba(0,0,0,0.62) 70%,
        #000 100%
      );
    }

    /* Top nav */
    .hero-top {
      position: absolute;
      top: 44px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 10;
    }

    .logo {
      height: 28px;
      object-fit: contain;
    }

    .nav-icons {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .nav-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-icon svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Hero content bottom */
    .hero-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 24px 36px;
      z-index: 10;
    }

    .hero-eyebrow {
      color: rgba(255,255,255,0.5);
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .hero-headline {
      color: #fff;
      font-size: 38px;
      font-family: Georgia, serif;
      font-weight: 400;
      line-height: 1.26;
      margin-bottom: 28px;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #C9A96E;
      padding: 12px 20px;
      color: #000;
      font-size: 9px;
      letter-spacing: 3px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .hero-cta svg {
      width: 12px;
      height: 12px;
      stroke: #000;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Below hero — bottom of phone */
    .below-hero {
      padding: 20px;
      background: #000;
    }

    .section-label {
      color: #C9A96E;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .lifestyle-block {
      background: #0f0f0f;
      border-left: 2px solid #C9A96E;
      padding: 12px 14px;
    }

    .lifestyle-headline {
      color: #fff;
      font-size: 13px;
      font-family: Georgia, serif;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .lifestyle-sub {
      color: #666;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Full-width preview */
    .fullwidth {
      width: 720px;
      max-width: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }

    .fullwidth .hero {
      height: 520px;
    }

    @media print {
      body { background: #000; padding: 0; gap: 30px; }
      .phone { box-shadow: none; }
    }
  </style>
</head>
<body>

  <p class="label">Phone Preview — Home Screen Hero</p>

  <!-- Phone mockup -->
  <div class="phone">
    <div class="notch"></div>

    <div class="hero">
      <img class="hero-image" src="assets/hero1.png" alt="Hero" />
      <div class="hero-gradient"></div>

      <div class="hero-top">
        <img class="logo" src="assets/logoo.png" alt="MBURRZD" />
        <div class="nav-icons">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <div class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
          <div class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </div>
        </div>
      </div>

      <div class="hero-content">
        <p class="hero-eyebrow">NEW SEASON · SS26</p>
        <p class="hero-headline">The Art of<br>Refined Dressing</p>
        <div class="hero-cta">
          EXPLORE COLLECTION
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </div>
    </div>

    <div class="below-hero">
      <p class="section-label">The Edit</p>
      <div class="lifestyle-block">
        <p class="lifestyle-headline">Quiet Luxury, Amplified</p>
        <p class="lifestyle-sub">SS26 Collection</p>
      </div>
    </div>
  </div>

  <p class="label" style="margin-top: 10px;">Full-Width Preview</p>

  <!-- Full-width view -->
  <div class="fullwidth">
    <div class="hero" style="height:520px;">
      <img class="hero-image" src="assets/hero1.png" alt="Hero" style="object-position: center top;" />
      <div class="hero-gradient"></div>

      <div class="hero-top">
        <img class="logo" src="assets/logoo.png" alt="MBURRZD" />
        <div class="nav-icons">
          <div class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <div class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </div>
          <div class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </div>
        </div>
      </div>

      <div class="hero-content">
        <p class="hero-eyebrow">NEW SEASON · SS26</p>
        <p class="hero-headline">The Art of<br>Refined Dressing</p>
        <div class="hero-cta">
          EXPLORE COLLECTION
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
